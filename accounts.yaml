server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://accountsdb:3307/accountsdb
    username: root
    password: root

  jpa:
    database: mysql
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always

