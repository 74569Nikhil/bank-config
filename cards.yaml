server:
  port: 9000

spring:
  datasource:
    url: jdbc:mysql://host.docker.internal:3309/cardsdb
    username: root
    password: root

  jpa:
    database: mysql
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always

build:
  version: "3.0"

cards:
  message: "Welcome to card related local trail api's"
  contactDetails:
    name: "nikhil"
    email: "nikhil@gmail.com"
  onCallSupport:
